server:
  port: 8081

spring:
  application:
    name: velocity-mall-product
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/velocity_mall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: root
    password: root
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 540000
      connection-test-query: SELECT 1
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    out-of-order: false
    encoding: UTF-8
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:root}
  secret-key: ${MINIO_SECRET_KEY:rootroot}
  bucket-name: ${MINIO_BUCKET_NAME:velocity-mall-product}

product:
  cover-fallback:
    urls:
      - ${PRODUCT_COVER_FALLBACK_1:/minio/velocity-mall-product/products/default-covers/phone-1.png}
      - ${PRODUCT_COVER_FALLBACK_2:/minio/velocity-mall-product/products/default-covers/phone-2.png}
      - ${PRODUCT_COVER_FALLBACK_3:/minio/velocity-mall-product/products/default-covers/phone-3.png}

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: product-producer-group

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-value: 1
      logic-not-delete-value: 0

---
spring:
  config:
    activate:
      on-profile: cluster
  data:
    redis:
      cluster:
        nodes:
          - 127.0.0.1:7001
          - 127.0.0.1:7002
          - 127.0.0.1:7003
          - 127.0.0.1:7004
          - 127.0.0.1:7005
          - 127.0.0.1:7006
