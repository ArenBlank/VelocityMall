name: VelocityMall CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: velocity-mall-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate Docker Compose
        run: docker compose -f docker/docker-compose.yml config --quiet

      - name: Build all modules
        run: mvn -B -ntp -DskipTests package

      - name: Enforce gateway WebFlux stack
        shell: bash
        run: |
          set -euo pipefail
          dependency_tree="$(mvn -B -ntp -pl velocity-mall-gateway dependency:tree \
            -Dincludes=org.springframework.boot:spring-boot-starter-web,org.springframework:spring-webmvc)"
          echo "$dependency_tree"

          if echo "$dependency_tree" | grep -E "org\.springframework\.boot:spring-boot-starter-web|org\.springframework:spring-webmvc"; then
            echo "Gateway must stay WebFlux-only. spring-boot-starter-web/spring-webmvc is not allowed."
            exit 1
          fi

  full-chain-e2e:
    name: Full Chain E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build executable jars
        run: mvn -B -ntp -DskipTests package

      - name: Configure Elasticsearch kernel setting
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Validate E2E Docker Compose
        run: docker compose -f docker/docker-compose.e2e.yml config --quiet

      - name: Run full-chain E2E checks
        run: bash scripts/ci/e2e.sh

      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-chain-e2e-logs
          path: build/ci-e2e-logs

  performance-tests:
    name: k6 Load & Chaos Tests (CI Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: full-chain-e2e

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: velocity_mall
        ports:
          - 3306:3306

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable jars
        run: mvn -B -ntp -DskipTests package

      - name: Start Nacos
        run: |
          docker run -d --name ci-nacos \
            -p 8848:8848 -p 9848:9848 \
            -e MODE=standalone \
            nacos/nacos-server:v2.2.3
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness > /dev/null 2>&1; then
              echo "Nacos ready (attempt $i)"; break
            fi
            sleep 2
          done
          # Wait for gRPC port — readiness endpoint returns OK before gRPC is listening
          grpc_ok=false
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/9848) >/dev/null 2>&1; then
              echo "Nacos gRPC ready (attempt $i)"; grpc_ok=true; break
            fi
            sleep 2
          done
          if [[ "$grpc_ok" != "true" ]]; then
            echo "ERROR: Nacos gRPC port 9848 never opened"
            exit 1
          fi
          sleep 5
          echo "Nacos fully ready"

      - name: Start RocketMQ
        run: |
          # NameServer
          docker run -d --name ci-rmqnamesrv \
            -p 9876:9876 \
            -e JAVA_OPT_EXT="-server -Xms128m -Xmx128m -Xmn64m" \
            apache/rocketmq:4.9.4 sh mqnamesrv
          # Broker
          docker run -d --name ci-rmqbroker \
            -p 10911:10911 -p 10909:10909 \
            -e NAMESRV_ADDR="127.0.0.1:9876" \
            -e JAVA_OPT_EXT="-server -Xms256m -Xmx256m -Xmn128m" \
            apache/rocketmq:4.9.4 sh -c \
            "printf 'brokerClusterName=DefaultCluster\nbrokerName=broker-a\nbrokerId=0\nnamesrvAddr=127.0.0.1:9876\nbrokerIP1=127.0.0.1\nautoCreateTopicEnable=true\ndeleteWhen=04\nfileReservedTime=48\nbrokerRole=ASYNC_MASTER\nflushDiskType=ASYNC_FLUSH\n' > /home/rocketmq/rocketmq-4.9.4/conf/broker.conf && sh mqbroker -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf"
          # Wait for NameServer
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/9876) >/dev/null 2>&1; then
              echo "RocketMQ NameServer ready (attempt $i)"; break
            fi
            sleep 2
          done
          # Wait for Broker
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/10911) >/dev/null 2>&1; then
              echo "RocketMQ Broker ready (attempt $i)"; break
            fi
            sleep 2
          done
          sleep 5
          echo "RocketMQ ready"

      - name: Seed Database
        run: |
          for i in $(seq 1 60); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL ready"; break
            fi
            sleep 1
          done
          mysql -h 127.0.0.1 -uroot -proot --default-character-set=utf8mb4 velocity_mall << 'SQL'
          CREATE TABLE IF NOT EXISTS ums_user (
              id BIGINT NOT NULL, username VARCHAR(64) NOT NULL, password VARCHAR(255) NOT NULL,
              nickname VARCHAR(64) DEFAULT NULL, phone VARCHAR(20) DEFAULT NULL,
              status TINYINT NOT NULL DEFAULT 1, create_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
              update_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
              is_deleted TINYINT NOT NULL DEFAULT 0,
              PRIMARY KEY (id), UNIQUE KEY uk_username (username)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE IF NOT EXISTS pms_sku (
              id BIGINT NOT NULL, spu_id BIGINT NOT NULL, sku_name VARCHAR(128) NOT NULL,
              sku_code VARCHAR(64) NOT NULL, price DECIMAL(18,2) NOT NULL DEFAULT 0.00,
              stock INT NOT NULL DEFAULT 0, lock_stock INT NOT NULL DEFAULT 0,
              sale_count INT NOT NULL DEFAULT 0, cover_img VARCHAR(255) DEFAULT NULL,
              version INT NOT NULL DEFAULT 0, create_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
              update_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
              is_deleted TINYINT NOT NULL DEFAULT 0,
              PRIMARY KEY (id), UNIQUE KEY uk_sku_code (sku_code)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          CREATE TABLE IF NOT EXISTS sms_seckill_activity (
              id BIGINT NOT NULL, sku_id BIGINT NOT NULL, spu_id BIGINT NOT NULL,
              activity_name VARCHAR(128) NOT NULL,
              seckill_price DECIMAL(18,2) NOT NULL DEFAULT 0.00,
              original_price DECIMAL(18,2) NOT NULL DEFAULT 0.00,
              seckill_stock INT NOT NULL DEFAULT 0,
              start_time DATETIME NOT NULL, end_time DATETIME NOT NULL,
              status TINYINT NOT NULL DEFAULT 1, version INT NOT NULL DEFAULT 0,
              create_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
              update_time DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
              is_deleted TINYINT NOT NULL DEFAULT 0,
              PRIMARY KEY (id),
              KEY idx_sku_status_time (sku_id, status, start_time, end_time),
              KEY idx_status_time (status, start_time, end_time)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          INSERT INTO pms_sku (id, spu_id, sku_name, sku_code, price, stock, lock_stock, sale_count, version)
          VALUES (2001, 1001, 'Velocity Phone Pro 512G', 'VM-PHONE-512G', 7999.00, 100, 0, 0, 0);
          INSERT INTO sms_seckill_activity
              (id, sku_id, spu_id, activity_name, seckill_price, original_price, seckill_stock, start_time, end_time, status, version)
          VALUES
              (23001, 2001, 1001, 'Velocity Phone Pro CI Flash Sale', 4999.00, 7999.00, 1000, DATE_SUB(NOW(), INTERVAL 1 DAY), DATE_ADD(NOW(), INTERVAL 1 YEAR), 1, 0);
          SQL

      - name: Start Services (Gateway + User + Product + Seckill)
        run: |
          pids=()
          for svc in product seckill gateway user; do
            jar=$(find velocity-mall-${svc}/target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
            java -Xms128m -Xmx256m -jar "$jar" > /tmp/${svc}.log 2>&1 &
            pids+=($!)
            echo "Started $svc PID ${pids[-1]}"
          done
          # TCP port check — fail if any port never opens
          for port in 8080 8081 8083 8088; do
            port_ok=false
            for i in $(seq 1 60); do
              if (echo > /dev/tcp/127.0.0.1/${port}) >/dev/null 2>&1; then
                echo "Port ${port} ready (attempt $i)"; port_ok=true; break
              fi
              sleep 2
            done
            if [[ "$port_ok" != "true" ]]; then
              echo "ERROR: Port ${port} never opened. Dumping stderr:"
              case ${port} in
                8080) svc=gateway ;; 8081) svc=product ;; 8083) svc=seckill ;; 8088) svc=user ;;
              esac
              tail -50 /tmp/${svc}.log 2>/dev/null || true
              exit 1
            fi
          done
          # Wait for Nacos service registration — fail if any service never registers
          for svc in velocity-mall-gateway velocity-mall-product velocity-mall-user velocity-mall-seckill; do
            nacos_ok=false
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:8848/nacos/v1/ns/instance/list?serviceName=${svc}" 2>/dev/null | python3 -c 'import json,sys; payload=json.load(sys.stdin); hosts=payload.get("hosts") or []; sys.exit(0 if any(h.get("healthy") for h in hosts) else 1)' >/dev/null 2>&1; then
                echo "Nacos ${svc} healthy (attempt $i)"; nacos_ok=true; break
              fi
              sleep 2
            done
            if [[ "$nacos_ok" != "true" ]]; then
              echo "ERROR: Nacos ${svc} never registered as healthy"
              exit 1
            fi
          done
          # Verify JVM processes still alive
          for pid in ${pids[*]}; do
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "ERROR: JVM process PID $pid died"
              exit 1
            fi
          done
          sleep 5
          echo "All services up"

      - name: Register e2euser
        run: |
          for i in $(seq 1 15); do
            resp=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/users/register \
              -H "Content-Type: application/json" \
              -d '{"username":"e2euser","password":"e2epass123"}' 2>/dev/null || true)
            echo "Register attempt $i: $resp"
            if echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get("code") in (20000,50001) else 1)' 2>/dev/null; then
              echo "e2euser ready"; exit 0
            fi
            sleep 2
          done
          echo "Failed to register e2euser"
          exit 1

      - name: Install k6
        run: |
          curl -sS https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y -qq k6
          k6 version

      - name: Verify gateway routing
        run: |
          for i in $(seq 1 30); do
            status=$(curl -sS -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:8080/api/v1/users/login \
              -H "Content-Type: application/json" \
              -d '{"username":"e2euser","password":"e2epass123"}' 2>/dev/null || true)
            if [[ "${status}" == "200" ]]; then
              echo "Gateway routing OK"; exit 0
            fi
            echo "Gateway not routing yet (status=${status}), retry $i/30..."
            sleep 2
          done
          echo "Gateway routing check failed"
          exit 1

      - name: Generate Test Users
        run: |
          cd scripts/performance
          python3 generate_users.py
          python3 -c "import json; print(f'{len(json.load(open(\"users.json\")))} users ready')"

      - name: Run k6 Multi-User Seckill (CI mode)
        run: |
          cd scripts/performance
          CI=true k6 run --summary-export=multi-user-summary.json multi-user-seckill-test.js
          echo "--- summary ---"
          python3 -c "import json; s=json.load(open('multi-user-summary.json')); m=s.get('metrics',{}); print(f'reqs={m.get(\"http_reqs\",{}).get(\"count\",\"?\")}, p95={m.get(\"http_req_duration\",{}).get(\"p(95)\",\"?\")}ms')"

      - name: Run k6 Chaos Spike (CI mode)
        run: |
          cd scripts/performance
          CI=true k6 run --summary-export=chaos-summary.json chaos-spike-test.js
          echo "--- summary ---"
          python3 -c "import json; s=json.load(open('chaos-summary.json')); m=s.get('metrics',{}); print(f'reqs={m.get(\"http_reqs\",{}).get(\"count\",\"?\")}, p95={m.get(\"http_req_duration\",{}).get(\"p(95)\",\"?\")}ms')"

      - name: Dump logs on failure
        if: failure()
        run: |
          for f in /tmp/*.log; do
            echo "========== $f =========="
            tail -80 "$f" || true
          done
