name: velocity-mall

services:
  redis-cluster-node-1:
    image: redis:7.2-alpine
    container_name: redis-cluster-1-container-velocity
    restart: unless-stopped
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - ./data/redis-cluster/1:/data
    command: >
      redis-server
        --port 7001
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
    networks:
      - velocity-mall-network

  redis-cluster-node-2:
    image: redis:7.2-alpine
    container_name: redis-cluster-2-container-velocity
    restart: unless-stopped
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - ./data/redis-cluster/2:/data
    command: >
      redis-server
        --port 7002
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
    networks:
      - velocity-mall-network

  redis-cluster-node-3:
    image: redis:7.2-alpine
    container_name: redis-cluster-3-container-velocity
    restart: unless-stopped
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - ./data/redis-cluster/3:/data
    command: >
      redis-server
        --port 7003
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
    networks:
      - velocity-mall-network

  redis-cluster-node-4:
    image: redis:7.2-alpine
    container_name: redis-cluster-4-container-velocity
    restart: unless-stopped
    ports:
      - "7004:7004"
      - "17004:17004"
    volumes:
      - ./data/redis-cluster/4:/data
    command: >
      redis-server
        --port 7004
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
    networks:
      - velocity-mall-network

  redis-cluster-node-5:
    image: redis:7.2-alpine
    container_name: redis-cluster-5-container-velocity
    restart: unless-stopped
    ports:
      - "7005:7005"
      - "17005:17005"
    volumes:
      - ./data/redis-cluster/5:/data
    command: >
      redis-server
        --port 7005
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
    networks:
      - velocity-mall-network

  redis-cluster-node-6:
    image: redis:7.2-alpine
    container_name: redis-cluster-6-container-velocity
    restart: unless-stopped
    ports:
      - "7006:7006"
      - "17006:17006"
    volumes:
      - ./data/redis-cluster/6:/data
    command: >
      redis-server
        --port 7006
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly yes
    networks:
      - velocity-mall-network

  redis-cluster-init:
    image: redis:7.2-alpine
    container_name: redis-cluster-init-container-velocity
    depends_on:
      - redis-cluster-node-1
      - redis-cluster-node-2
      - redis-cluster-node-3
      - redis-cluster-node-4
      - redis-cluster-node-5
      - redis-cluster-node-6
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Redis Cluster nodes to start..."
        sleep 8
        echo "Creating Redis Cluster (3 masters + 3 replicas)..."
        redis-cli --cluster create \
          redis-cluster-node-1:7001 \
          redis-cluster-node-2:7002 \
          redis-cluster-node-3:7003 \
          redis-cluster-node-4:7004 \
          redis-cluster-node-5:7005 \
          redis-cluster-node-6:7006 \
          --cluster-replicas 1 \
          --cluster-yes
        echo "Redis Cluster created."
    networks:
      - velocity-mall-network

networks:
  velocity-mall-network:
    driver: bridge
