name: velocity-mall

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container-velocity
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: velocity_mall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ../doc/sql:/docker-entrypoint-initdb.d
      - ./data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - velocity-mall-network

  redis:
    image: redis:7.2-alpine
    container_name: redis-container-velocity
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - velocity-mall-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: nacos-container-velocity
    restart: unless-stopped
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - velocity-mall-network

  minio:
    image: minio/minio:latest
    container_name: minio-container-velocity
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: rootroot
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - velocity-mall-network

  nginx:
    image: nginx:1.24-alpine
    container_name: nginx-container-velocity
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - velocity-mall-network

  mqnamesrv:
    image: apache/rocketmq:4.9.4
    container_name: mqnamesrv-container-velocity
    restart: unless-stopped
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
      TZ: Asia/Shanghai
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - velocity-mall-network

  mqbroker:
    image: apache/rocketmq:4.9.4
    container_name: mqbroker-container-velocity
    restart: unless-stopped
    depends_on:
      - mqnamesrv
    environment:
      NAMESRV_ADDR: mqnamesrv-container-velocity:9876
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
      TZ: Asia/Shanghai
    ports:
      - "10911:10911"
      - "10909:10909"
    command:
      - sh
      - -c
      - |
        printf 'brokerClusterName=DefaultCluster\nbrokerName=broker-a\nbrokerId=0\nnamesrvAddr=mqnamesrv-container-velocity:9876\nbrokerIP1=127.0.0.1\nautoCreateTopicEnable=true\ndeleteWhen=04\nfileReservedTime=48\nbrokerRole=ASYNC_MASTER\nflushDiskType=ASYNC_FLUSH\n' > /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
        sh mqbroker -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    networks:
      - velocity-mall-network

networks:
  velocity-mall-network:
    driver: bridge
