name: velocity-mall

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container-velocity
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: velocity_mall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ../doc/sql:/docker-entrypoint-initdb.d
      - ./data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - velocity-mall-network

  redis:
    image: redis:7.2-alpine
    container_name: redis-container-velocity
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - velocity-mall-network

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos-container-huang
    restart: unless-stopped
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - velocity-mall-network

  minio:
    image: minio/minio:latest
    container_name: minio-container-velocity
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: rootroot
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - velocity-mall-network

  nginx:
    image: nginx:1.24-alpine
    container_name: nginx-container-velocity
    restart: unless-stopped
    ports:
      - "8088:80"
    networks:
      - velocity-mall-network

  rmqnamesrv:
    image: apache/rocketmq:4.9.4
    container_name: rmqnamesrv-container-huang
    restart: unless-stopped
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
      TZ: Asia/Shanghai
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - velocity-mall-network

  rmqbroker:
    image: apache/rocketmq:4.9.4
    container_name: rmqbroker-container-huang
    restart: unless-stopped
    depends_on:
      - rmqnamesrv
    environment:
      NAMESRV_ADDR: rmqnamesrv:9876
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
      TZ: Asia/Shanghai
    ports:
      - "10911:10911"
      - "10909:10909"
    command:
      - sh
      - -c
      - |
        printf 'brokerClusterName=DefaultCluster\nbrokerName=broker-a\nbrokerId=0\nnamesrvAddr=rmqnamesrv:9876\nbrokerIP1=127.0.0.1\nautoCreateTopicEnable=true\ndeleteWhen=04\nfileReservedTime=48\nbrokerRole=ASYNC_MASTER\nflushDiskType=ASYNC_FLUSH\n' > /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
        sh mqbroker -c /home/rocketmq/rocketmq-4.9.4/conf/broker.conf
    networks:
      - velocity-mall-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    container_name: elasticsearch-container-velocity
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
    ports:
      - "9201:9200"
      - "9300:9300"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - velocity-mall-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.4
    container_name: kibana-container-velocity
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      TZ: Asia/Shanghai
    ports:
      - "5601:5601"
    networks:
      - velocity-mall-network

networks:
  velocity-mall-network:
    driver: bridge
